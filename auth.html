<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود / ثبت‌نام — بازارنو</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#0E1A14;--forest:#14542E;--green:#1A7A47;--mint:#25B067;--lime:#7ED957;--cream:#F5F0E8;--sand:#EBE4D5;--paper:#FDFBF7;--red:#D94F3D;--card:#fff;--bd:rgba(14,26,20,.09);--bd2:rgba(14,26,20,.16);--t1:#0E1A14;--t2:#3D5045;--t3:#7A9080;--r:14px;--rsm:9px;--pill:999px;--shg:0 6px 28px rgba(26,122,71,.32)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Vazirmatn',sans-serif;direction:rtl;background:var(--cream);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.auth-card{background:var(--card);border-radius:20px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.12);border:1.5px solid var(--bd)}
.logo{text-align:center;font-size:24px;font-weight:800;color:var(--forest);margin-bottom:1.5rem;letter-spacing:-1px}
.logo em{color:var(--mint);font-style:normal}
.tabs{display:flex;background:var(--sand);border-radius:var(--pill);padding:4px;margin-bottom:1.5rem;gap:4px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:var(--pill);font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;transition:.2s}
.tab.on{background:var(--card);color:var(--forest);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:5px}
.field input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--bd2);border-radius:var(--rsm);font-family:'Vazirmatn',sans-serif;font-size:13px;background:var(--paper);color:var(--t1);transition:.2s}
.field input:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 3px rgba(37,176,103,.1)}
.btn-main{width:100%;height:48px;background:var(--forest);color:var(--lime);border:none;border-radius:var(--pill);font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.2s;box-shadow:var(--shg)}
.btn-main:hover{background:var(--green)}
.btn-main:disabled{opacity:.55;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:var(--rsm);font-size:12px;font-weight:600;margin-bottom:1rem;display:none}
.msg.err{background:#FDE8E6;color:var(--red);border:1px solid rgba(217,79,61,.2)}
.msg.ok{background:#E8F8EF;color:var(--green);border:1px solid rgba(37,176,103,.2)}
.back{text-align:center;margin-top:1rem;font-size:12px;color:var(--t3)}
.back a{color:var(--forest);font-weight:700;text-decoration:none}
.divider{text-align:center;font-size:11px;color:var(--t3);margin:1rem 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--bd2)}
.divider span{background:var(--card);padding:0 10px;position:relative}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">🛍 بازار<em>نو</em></div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('login')">ورود</button>
    <button class="tab" onclick="showTab('register')">ثبت‌نام</button>
  </div>
  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="tab-login">
    <div class="field"><label>ایمیل</label><input type="email" id="lEmail" placeholder="you@example.com"></div>
    <div class="field"><label>رمز عبور</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="btn-main" id="lBtn" onclick="doLogin()">ورود</button>
    <div class="divider"><span>یا</span></div>
    <div style="text-align:center;font-size:12px;color:var(--t3)">
      <a href="#" onclick="forgotPass()" style="color:var(--forest);font-weight:700;text-decoration:none">فراموشی رمز عبور</a>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none">
    <div class="field"><label>نام</label><input type="text" id="rName" placeholder="اسم یا نام مستعار"></div>
    <div class="field"><label>ایمیل</label><input type="email" id="rEmail" placeholder="you@example.com"></div>
    <div class="field"><label>شماره تماس</label><input type="tel" id="rPhone" placeholder="09xxxxxxxxx" maxlength="11"></div>
    <div class="field"><label>رمز عبور</label><input type="password" id="rPass" placeholder="حداقل ۶ کاراکتر"></div>
    <button class="btn-main" id="rBtn" onclick="doRegister()">ثبت‌نام رایگان</button>
  </div>

  <div class="back"><a href="index.html">← برگشت به بازارنو</a></div>
</div>

<script>
const SB = supabase.createClient(
  "https://ffpzdohwrhdrdgtczzjc.supabase.co",
  "sb_publishable_J8zWi6EO4xP3LxmsS2gXig_HY3aHycL"
);

// اگه لاگینه، بره خانه
SB.auth.getUser().then(({data:{user}})=>{if(user)location.href='index.html'});

function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===(t==='login'?0:1)));
  document.getElementById('tab-login').style.display=t==='login'?'':'none';
  document.getElementById('tab-register').style.display=t==='register'?'':'none';
  showMsg('','');
}

function showMsg(txt,type){const m=document.getElementById('msg');m.textContent=txt;m.className='msg '+(type||'');m.style.display=txt?'block':'none'}

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  if(!email||!pass){showMsg('همه فیلدها رو پر کن','err');return}
  const btn=document.getElementById('lBtn');btn.disabled=true;btn.textContent='در حال ورود...';
  const {error}=await SB.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='ورود';
  if(error){showMsg('ایمیل یا رمز اشتباهه','err');return}
  location.href='index.html';
}

async function doRegister(){
  const name=document.getElementById('rName').value.trim();
  const email=document.getElementById('rEmail').value.trim();
  const phone=document.getElementById('rPhone').value.trim();
  const pass=document.getElementById('rPass').value;
  if(!name||!email||!pass){showMsg('فیلدهای ستاره‌دار اجباریه','err');return}
  if(pass.length<6){showMsg('رمز باید حداقل ۶ کاراکتر باشه','err');return}
  const btn=document.getElementById('rBtn');btn.disabled=true;btn.textContent='در حال ثبت...';
  const {error}=await SB.auth.signUp({
    email,password:pass,
    options:{data:{full_name:name,phone}}
  });
  btn.disabled=false;btn.textContent='ثبت‌نام رایگان';
  if(error){showMsg(error.message,'err');return}
  showMsg('✅ ثبت‌نام موفق! ایمیل تأیید فرستادیم — بعد از تأیید وارد شو','ok');
}

async function forgotPass(){
  const email=prompt('ایمیلت رو بنویس:');
  if(!email)return;
  const {error}=await SB.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/auth.html'});
  if(!error)alert('لینک بازیابی به ایمیلت فرستاده شد');
}

// Handle OAuth tokens
SB.auth.onAuthStateChange((_,session)=>{if(session)location.href='index.html'});
</script>
</body>
</html>
